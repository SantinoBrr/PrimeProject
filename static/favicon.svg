<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <!-- Scissors icon (simplified) -->
  <!-- Left blade -->
  <circle cx="20" cy="24" r="5" fill="none" stroke="white" stroke-width="3"/>
  <!-- Right blade -->
  <circle cx="20" cy="40" r="5" fill="none" stroke="white" stroke-width="3"/>
  <!-- Blade arms crossing -->
  <line x1="24" y1="26" x2="46" y2="44" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="24" y1="38" x2="46" y2="20" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
