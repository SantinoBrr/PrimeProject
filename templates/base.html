<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}StyleSense — AI Haircut Advisor{% endblock %}</title>
  <meta name="description" content="Analizamos tu rostro con IA para recomendarte los mejores cortes de cabello de 2026 personalizados para ti.">

  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

  <!-- Supabase JS SDK via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  {% block head %}{% endblock %}
</head>
<body>

{% block navbar %}
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand">
      <div class="brand-icon">✂</div>
      <span>Style<span class="brand-dot">Sense</span></span>
    </a>

    <ul class="navbar-nav" id="main-nav">
      <li><a href="/dashboard" id="nav-dashboard">Dashboard</a></li>
      <li><a href="/analyze" id="nav-analyze">Analizar</a></li>
      <li><a href="/feedback" id="nav-feedback">Mi Corte</a></li>
    </ul>

    <div class="navbar-actions">
      <!-- Shown when logged out -->
      <div id="nav-auth-out" class="hidden">
        <a href="/login" class="btn btn-outline btn-sm">Iniciar sesión</a>
      </div>
      <!-- Shown when logged in -->
      <div id="nav-auth-in" class="hidden">
        <div class="navbar-user" id="nav-user-btn">
          <div class="navbar-avatar" id="nav-avatar">?</div>
          <span class="navbar-username" id="nav-username">...</span>
          <span style="color:var(--text-muted);font-size:0.7rem">▾</span>
        </div>
        <div id="user-dropdown" class="hidden" style="position:absolute;top:calc(var(--nav-height) + 8px);right:1.5rem;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:0.5rem;min-width:160px;z-index:1001;box-shadow:var(--shadow-lg);">
          <a href="/onboarding" style="display:block;padding:0.5rem 0.75rem;border-radius:var(--radius-md);color:var(--text-secondary);font-size:0.875rem;transition:var(--transition);" onmouseover="this.style.background='var(--bg-surface)'" onmouseout="this.style.background=''">⚙ Perfil</a>
          <div style="height:1px;background:var(--border);margin:0.25rem 0;"></div>
          <button onclick="authSignOut()" style="display:block;width:100%;text-align:left;padding:0.5rem 0.75rem;border-radius:var(--radius-md);color:var(--red-bright);font-size:0.875rem;background:none;border:none;cursor:pointer;transition:var(--transition);" onmouseover="this.style.background='rgba(220,38,38,0.08)'" onmouseout="this.style.background=''">↩ Cerrar sesión</button>
        </div>
      </div>
      <button class="navbar-toggle" id="nav-toggle" aria-label="Menu">☰</button>
    </div>
  </div>
</nav>
{% endblock %}

{% block body %}
<div class="page-wrapper">
  {% block content %}{% endblock %}
</div>
{% endblock %}

<!-- Toast Container -->
<div id="toast-container"></div>

<!-- Global Config -->
<script>
  window.SUPABASE_URL = "{{ supabase_url }}";
  window.SUPABASE_ANON_KEY = "{{ supabase_anon_key }}";
</script>

<!-- Auth JS (global) -->
<script>
// ── Supabase client ──────────────────────────────────────────
window.supabase = window.supabase.createClient(
  window.SUPABASE_URL,
  window.SUPABASE_ANON_KEY
);

// ── Auth helpers ─────────────────────────────────────────────
async function getSession() {
  const { data: { session } } = await supabase.auth.getSession();
  return session;
}

async function getToken() {
  const session = await getSession();
  return session?.access_token || null;
}

async function authSignOut() {
  await supabase.auth.signOut();
  window.location.href = '/login';
}

async function apiFetch(url, options = {}) {
  const token = await getToken();
  const headers = {
    'Content-Type': 'application/json',
    ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
    ...(options.headers || {}),
  };
  const res = await fetch(url, { ...options, headers });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'Error desconocido' }));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

// ── Toast system ─────────────────────────────────────────────
function showToast(title, message = '', type = 'info', duration = 4000) {
  const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.innerHTML = `
    <span class="toast-icon">${icons[type] || icons.info}</span>
    <div class="toast-body">
      <div class="toast-title">${title}</div>
      ${message ? `<div class="toast-message">${message}</div>` : ''}
    </div>
    <button class="toast-close" onclick="this.closest('.toast').remove()">×</button>
  `;
  container.appendChild(toast);
  if (duration > 0) setTimeout(() => toast.remove(), duration);
  return toast;
}

// ── Navbar auth state ─────────────────────────────────────────
async function updateNavbar() {
  const session = await getSession();
  const authOut = document.getElementById('nav-auth-out');
  const authIn = document.getElementById('nav-auth-in');
  if (!authOut || !authIn) return;

  if (session) {
    authOut.classList.add('hidden');
    authIn.classList.remove('hidden');
    const email = session.user.email || '';
    const initials = email.substring(0, 2).toUpperCase();
    const navAvatar = document.getElementById('nav-avatar');
    const navUsername = document.getElementById('nav-username');
    if (navAvatar) navAvatar.textContent = initials;
    if (navUsername) navUsername.textContent = email.split('@')[0];
  } else {
    authOut.classList.remove('hidden');
    authIn.classList.add('hidden');
  }
}

// ── User dropdown toggle ──────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  updateNavbar();

  const toggle = document.getElementById('nav-toggle');
  const nav = document.getElementById('main-nav');
  if (toggle && nav) {
    toggle.addEventListener('click', () => nav.classList.toggle('open'));
  }

  const userBtn = document.getElementById('nav-user-btn');
  const dropdown = document.getElementById('user-dropdown');
  if (userBtn && dropdown) {
    userBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdown.classList.toggle('hidden');
    });
    document.addEventListener('click', () => dropdown.classList.add('hidden'));
  }

  // Set active nav link
  const path = window.location.pathname;
  document.querySelectorAll('.navbar-nav a').forEach(a => {
    if (a.getAttribute('href') === path) a.classList.add('active');
  });
});

// ── Loading overlay ───────────────────────────────────────────
function showLoading(message = 'Analizando con IA...') {
  const existing = document.getElementById('loading-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'loading-overlay';
  overlay.className = 'loading-overlay';
  overlay.innerHTML = `
    <div class="loading-spinner"></div>
    <div class="loading-text">${message}</div>
    <div style="font-size:0.8rem;color:var(--text-dim);margin-top:0.5rem">Esto puede tomar unos segundos...</div>
  `;
  document.body.appendChild(overlay);
}

function hideLoading() {
  const overlay = document.getElementById('loading-overlay');
  if (overlay) overlay.remove();
}

// ── Auth guard for protected pages ────────────────────────────
async function requireAuth(redirectTo = '/login') {
  const session = await getSession();
  if (!session) {
    window.location.href = redirectTo;
    return null;
  }
  return session;
}

// ── Profile guard ─────────────────────────────────────────────
async function requireProfile() {
  const session = await requireAuth();
  if (!session) return null;
  try {
    const result = await apiFetch('/api/profile');
    if (result.success && result.profile?.profile_complete) {
      return result.profile;
    } else {
      window.location.href = '/onboarding';
      return null;
    }
  } catch {
    window.location.href = '/onboarding';
    return null;
  }
}
</script>

{% block scripts %}{% endblock %}
</body>
</html>
